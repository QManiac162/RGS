networks:
    railgate-net:
        driver: bridge

volumes:
    postgres_data:
    pgadmin_data:

services:
    postgres:
        image: postgres:16-alpine
        container_name: railgate-postgres
        restart: unless-stopped
        environment:
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            POSTGRES_DB: ${POSTGRES_DB}
        ports:
            - "15432:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
            interval: 5s
            timeout: 5s
            retries: 10
        networks:
        - railgate-net

    redis:
        image: redis:7-alpine
        container_name: railgate-redis
        restart: unless-stopped
        ports:
            - "${REDIS_PORT}:6379"
        healthcheck:
            test: ["CMD", "redis-cli", "ping"]
            interval: 5s
            timeout: 5s
            retries: 10
        networks:
        - railgate-net

    pgadmin:
        image: dpage/pgadmin4:latest
        container_name: railgate-pgadmin
        restart: unless-stopped
        environment:
            PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
            PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
        ports:
            - "5050:80"
        depends_on:
            - postgres
        volumes:
            - pgadmin_data:/var/lib/pgadmin
        networks:
        - railgate-net

    terminal-service:
        image: railgate-terminal-service:latest
        container_name: railgate-terminal-service
        restart: unless-stopped
        build:
            context: ./services/terminal-service
            dockerfile: Dockerfile
        environment:
            NODE_ENV: ${NODE_ENV}
            PORT: ${PORT}
            DB_HOST: postgres
            DB_PORT: "5432"
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            POSTGRES_DB: ${POSTGRES_DB}
        ports:
            - "${TERMINAL_SERVICE_PORT}:3000"
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_healthy
        networks:
        - railgate-net